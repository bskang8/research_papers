<!DOCTYPE html>
<html lang="ko" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>로그인 — arXiv Paper Briefing</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #0f1117; color: #e2e8f0; min-height: 100vh;
           display: flex; align-items: center; justify-content: center; }
    .login-card { background: #1a1d2e; border: 1px solid #2d3748; border-radius: 12px;
                  padding: 2.5rem 2rem; width: 100%; max-width: 380px; }
    .form-control { background: #252840; border: 1px solid #3d4266; color: #e2e8f0; }
    .form-control:focus { background: #252840; border-color: #6366f1; color: #e2e8f0;
                          box-shadow: 0 0 0 .2rem rgba(99,102,241,.25); }
    .btn-primary { background: #6366f1; border-color: #6366f1; }
    .btn-primary:hover { background: #4f52e0; border-color: #4f52e0; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="text-center mb-4">
      <i class="bi bi-journal-bookmark-fill fs-2" style="color:#818cf8"></i>
      <h5 class="mt-2 fw-bold">arXiv Paper Briefing</h5>
    </div>
    {% if error %}
    <div class="alert alert-danger py-2 px-3 mb-3" style="font-size:.85rem; background:#3b0d0d; border-color:#7f1d1d; color:#fca5a5;">
      <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
    </div>
    {% endif %}
    <form method="post">
      <div class="mb-3">
        <label class="form-label" style="font-size:.85rem; color:#94a3b8;">사용자명</label>
        <input type="text" name="username" class="form-control" autofocus required>
      </div>
      <div class="mb-4">
        <label class="form-label" style="font-size:.85rem; color:#94a3b8;">비밀번호</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">
        <i class="bi bi-box-arrow-in-right me-1"></i>로그인
      </button>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
